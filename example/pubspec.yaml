name: clipshot_example
description: Demonstrates local video frame extraction with clipshot.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.11.1

dependencies:
  clipshot:
    path: ../
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/sample.mp4
